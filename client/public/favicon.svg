<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <!-- Truck mark -->
  <g transform="translate(8, 18)">
    <!-- Trailer -->
    <rect x="0" y="4" width="26" height="18" rx="3" fill="#fff"/>
    <!-- Cabin -->
    <path d="M29,8 L29,22 L44,22 L44,14 L38,8 Z" fill="#fff" opacity="0.92"/>
    <!-- Window -->
    <path d="M32,11 L32,15 L40,15 L40,14 L37,11 Z" fill="#6366F1" opacity="0.85"/>
    <!-- Wheels -->
    <circle cx="8" cy="24" r="3.6" fill="#1E1B33"/>
    <circle cx="8" cy="24" r="1.5" fill="#fff" opacity="0.9"/>
    <circle cx="19" cy="24" r="3.6" fill="#1E1B33"/>
    <circle cx="19" cy="24" r="1.5" fill="#fff" opacity="0.9"/>
    <circle cx="37" cy="24" r="3.6" fill="#1E1B33"/>
    <circle cx="37" cy="24" r="1.5" fill="#fff" opacity="0.9"/>
    <!-- Speed lines -->
    <rect x="-6" y="8" width="5" height="2" rx="1" fill="#fff" opacity="0.55"/>
    <rect x="-4" y="13" width="4" height="2" rx="1" fill="#fff" opacity="0.4"/>
    <rect x="-6" y="18" width="5" height="2" rx="1" fill="#fff" opacity="0.25"/>
  </g>
</svg>
