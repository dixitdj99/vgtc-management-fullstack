<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#0A6ED1"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>

  <!-- Truck silhouette -->
  <g transform="translate(30, 65)">
    <!-- Trailer body -->
    <rect x="0" y="10" width="85" height="42" rx="4" fill="white"/>
    <rect x="4" y="14" width="77" height="12" rx="2" fill="#0A6ED1" opacity="0.2"/>

    <!-- Cabin -->
    <path d="M85,18 L85,52 L125,52 L125,30 L108,10 L85,10 Z" fill="white"/>
    <rect x="100" y="16" width="18" height="16" rx="3" fill="#87CEEB" opacity="0.8"/>

    <!-- Wheels -->
    <circle cx="28" cy="54" r="10" fill="white"/>
    <circle cx="28" cy="54" r="6" fill="#0A6ED1"/>
    <circle cx="60" cy="54" r="10" fill="white"/>
    <circle cx="60" cy="54" r="6" fill="#0A6ED1"/>
    <circle cx="110" cy="54" r="10" fill="white"/>
    <circle cx="110" cy="54" r="6" fill="#0A6ED1"/>
  </g>

  <!-- VGTC Text -->
  <text x="100" y="158" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="900" letter-spacing="6">VGTC</text>
</svg>
