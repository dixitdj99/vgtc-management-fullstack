<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VGTC Order & Voucher Sync</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --accent: #10b981;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    body {
      width: 320px;
      margin: 0;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 900;
      color: var(--text);
    }
    .brand-icon {
      background: var(--primary);
      color: #fff;
      padding: 6px;
      border-radius: 8px;
      display: flex;
    }
    .status-badge {
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 99px;
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input, select {
      width: 100%;
      box-sizing: border-box;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--primary);
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .btn:hover {
      background: var(--primary-hover);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text-muted);
      margin-top: 6px;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text);
    }
    .section-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      margin: 14px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .history-list {
      max-height: 120px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .history-item {
      background: var(--card);
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
    }
    .empty-history {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      padding: 10px;
    }
    .msg-box {
      font-size: 11px;
      padding: 8px 10px;
      border-radius: 6px;
      margin-top: 8px;
      display: none;
    }
    .msg-success { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
    .msg-error { background: rgba(239,68,68,0.15); color: #f43f5e; border: 1px solid rgba(239,68,68,0.3); }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      VGTC Sync
    </div>
    <span class="status-badge" id="connStatus">ONLINE</span>
  </div>

  <div class="form-group">
    <label for="apiUrl">VGTC API URL</label>
    <input type="text" id="apiUrl" value="http://localhost:5000/api" placeholder="http://localhost:5000/api" />
  </div>

  <div class="form-group">
    <label for="voucherType">Default Voucher Type</label>
    <select id="voucherType">
      <option value="JK_Super">JK Super Voucher</option>
      <option value="Dump">Dump Voucher</option>
      <option value="Kosli_Bill">Kosli Bill</option>
      <option value="Jajjhar_Bill">Jhajjar Bill</option>
      <option value="Bahadurgarh_Bill">Bahadurgarh Bill</option>
      <option value="JK_Lakshmi">JK Lakshmi Voucher</option>
    </select>
  </div>

  <div class="form-group">
    <label for="authToken">Auth Token (Optional)</label>
    <input type="password" id="authToken" placeholder="Paste VGTC auth token..." />
  </div>

  <button class="btn" id="saveBtn">Save Settings</button>
  <button class="btn btn-secondary" id="scrapeActiveTabBtn">⚡ Sync Current Webpage Order</button>

  <div class="msg-box" id="msgBox"></div>

  <div class="section-title">Recent Sync History</div>
  <div class="history-list" id="historyList">
    <div class="empty-history">No vouchers synced yet</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
